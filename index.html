<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego del Gato - Clásico y Moderno</title>
    <!-- Tailwind CSS para un diseño moderno y rápido -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body {
            font-family: 'Outfit', sans-serif;
        }
        /* Estilos personalizados para animaciones y efectos */
        .gato-cell {
            transition: all 0.2s ease-in-out;
        }
        .gato-cell:active {
            transform: scale(0.95);
        }
        .winning-cell {
            animation: pulse-win 1s infinite alternate;
        }
        @keyframes pulse-win {
            0% { transform: scale(1); filter: brightness(1); }
            100% { transform: scale(1.05); filter: brightness(1.3); }
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-between p-4 md:p-8">

    <!-- Cabecera -->
    <header class="text-center w-full max-w-md mt-2">
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-indigo-500">
            TRES EN RAYA
        </h1>
        <p class="text-slate-400 text-sm mt-1">El clásico juego del gato mejorado</p>
    </header>

    <!-- Contenedor Principal -->
    <main class="w-full max-w-md flex flex-col items-center gap-6 my-auto">
        
        <!-- Selectores de Modo y Dificultad -->
        <div class="w-full bg-slate-800/50 p-4 rounded-2xl border border-slate-700/50 backdrop-blur shadow-xl space-y-3">
            <div class="flex gap-2">
                <button id="btn-pvp" class="flex-1 py-2 px-3 rounded-xl text-sm font-semibold transition-all duration-300 bg-indigo-600 text-white shadow-lg shadow-indigo-600/30">
                    👥 2 Jugadores
                </button>
                <button id="btn-pve" class="flex-1 py-2 px-3 rounded-xl text-sm font-semibold transition-all duration-300 bg-slate-700 text-slate-300 hover:bg-slate-600">
                    💻 Computadora
                </button>
            </div>
            
            <!-- Selector de Dificultad (Visible solo en PvE) -->
            <div id="difficulty-container" class="hidden flex items-center justify-between pt-2 border-t border-slate-700/50 animate-fade-in">
                <span class="text-xs text-slate-400 font-medium uppercase tracking-wider">Dificultad IA:</span>
                <div class="flex gap-1">
                    <button id="diff-easy" class="py-1 px-3 rounded-lg text-xs font-bold bg-green-500/20 text-green-400 border border-green-500/30">
                        Fácil
                    </button>
                    <button id="diff-hard" class="py-1 px-3 rounded-lg text-xs font-bold bg-slate-700 text-slate-400 hover:bg-slate-600">
                        Imposible
                    </button>
                </div>
            </div>
        </div>

        <!-- Marcador de Puntuación -->
        <div class="grid grid-cols-3 gap-3 w-full text-center">
            <div class="bg-slate-800/30 border border-slate-700/30 p-3 rounded-2xl">
                <p class="text-xs text-cyan-400 font-semibold uppercase tracking-wider">Jugador X</p>
                <p id="score-x" class="text-2xl font-bold mt-1">0</p>
            </div>
            <div class="bg-slate-800/30 border border-slate-700/30 p-3 rounded-2xl">
                <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider">Empates</p>
                <p id="score-ties" class="text-2xl font-bold mt-1">0</p>
            </div>
            <div class="bg-slate-800/30 border border-slate-700/30 p-3 rounded-2xl">
                <p id="label-o" class="text-xs text-rose-400 font-semibold uppercase tracking-wider">Jugador O</p>
                <p id="score-o" class="text-2xl font-bold mt-1">0</p>
            </div>
        </div>

        <!-- Indicador de Turno / Estado -->
        <div class="w-full text-center py-2">
            <span id="game-status" class="text-lg font-medium text-slate-200">
                Turno de <span class="text-cyan-400 font-bold">X</span>
            </span>
        </div>

        <!-- Cuadrícula del Gato -->
        <div class="grid grid-cols-3 gap-3 w-full aspect-square bg-slate-850 p-2 rounded-3xl border border-slate-800 shadow-2xl relative">
            
            <!-- Celdas -->
            <button class="gato-cell flex items-center justify-center bg-slate-800 rounded-2xl border border-slate-700/50 hover:bg-slate-700/40 text-5xl font-extrabold focus:outline-none" data-index="0"></button>
            <button class="gato-cell flex items-center justify-center bg-slate-800 rounded-2xl border border-slate-700/50 hover:bg-slate-700/40 text-5xl font-extrabold focus:outline-none" data-index="1"></button>
            <button class="gato-cell flex items-center justify-center bg-slate-800 rounded-2xl border border-slate-700/50 hover:bg-slate-700/40 text-5xl font-extrabold focus:outline-none" data-index="2"></button>
            
            <button class="gato-cell flex items-center justify-center bg-slate-800 rounded-2xl border border-slate-700/50 hover:bg-slate-700/40 text-5xl font-extrabold focus:outline-none" data-index="3"></button>
            <button class="gato-cell flex items-center justify-center bg-slate-800 rounded-2xl border border-slate-700/50 hover:bg-slate-700/40 text-5xl font-extrabold focus:outline-none" data-index="4"></button>
            <button class="gato-cell flex items-center justify-center bg-slate-800 rounded-2xl border border-slate-700/50 hover:bg-slate-700/40 text-5xl font-extrabold focus:outline-none" data-index="5"></button>
            
            <button class="gato-cell flex items-center justify-center bg-slate-800 rounded-2xl border border-slate-700/50 hover:bg-slate-700/40 text-5xl font-extrabold focus:outline-none" data-index="6"></button>
            <button class="gato-cell flex items-center justify-center bg-slate-800 rounded-2xl border border-slate-700/50 hover:bg-slate-700/40 text-5xl font-extrabold focus:outline-none" data-index="7"></button>
            <button class="gato-cell flex items-center justify-center bg-slate-800 rounded-2xl border border-slate-700/50 hover:bg-slate-700/40 text-5xl font-extrabold focus:outline-none" data-index="8"></button>

            <!-- Mensaje de Fin de Juego (Superpuesto sutilmente al terminar) -->
            <div id="win-overlay" class="absolute inset-0 bg-slate-900/95 rounded-3xl flex flex-col items-center justify-center gap-4 opacity-0 pointer-events-none transition-all duration-300">
                <h2 id="win-text" class="text-3xl font-black tracking-wide text-center"></h2>
                <button id="btn-next-round" class="px-6 py-3 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-xl font-bold shadow-lg shadow-indigo-500/20 hover:scale-105 transition-transform active:scale-95 text-sm uppercase tracking-wider">
                    Siguiente Ronda
                </button>
            </div>
        </div>

        <!-- Botones de Control Inferiores -->
        <div class="flex gap-4 w-full">
            <button id="btn-reset-board" class="flex-1 py-3 px-4 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 rounded-xl font-semibold text-sm transition-all flex items-center justify-center gap-2">
                🔄 Reiniciar Tablero
            </button>
            <button id="btn-reset-scores" class="py-3 px-4 bg-red-500/10 hover:bg-red-500/20 border border-red-500/20 text-red-400 rounded-xl font-semibold text-sm transition-all" title="Reiniciar puntuaciones">
                🗑️ Borrar Puntos
            </button>
        </div>

    </main>

    <!-- Footer -->
    <footer class="text-xs text-slate-500 text-center w-full mt-6">
        Hecho con fines de entretenimiento • 2026
    </footer>

    <!-- Lógica del Juego -->
    <script>
        // Configuración y Estado del Juego
        let board = Array(9).fill(null);
        let turn = 'X'; // 'X' siempre empieza
        let gameMode = 'pvp'; // 'pvp' (Jugadores) o 'pve' (Computadora)
        let aiDifficulty = 'easy'; // 'easy' o 'hard' (minimax)
        let isGameOver = false;
        let isAiThinking = false;

        const scores = {
            X: 0,
            O: 0,
            ties: 0
        };

        // Combinaciones Ganadoras
        const WINNING_COMBOS = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Horizontales
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Verticales
            [0, 4, 8], [2, 4, 6]             // Diagonales
        ];

        // Elementos del DOM
        const cells = document.querySelectorAll('.gato-cell');
        const gameStatus = document.getElementById('game-status');
        const scoreX = document.getElementById('score-x');
        const scoreO = document.getElementById('score-o');
        const scoreTies = document.getElementById('score-ties');
        const labelO = document.getElementById('label-o');
        
        const btnPvp = document.getElementById('btn-pvp');
        const btnPve = document.getElementById('btn-pve');
        const difficultyContainer = document.getElementById('difficulty-container');
        const btnEasy = document.getElementById('diff-easy');
        const btnHard = document.getElementById('diff-hard');

        const btnResetBoard = document.getElementById('btn-reset-board');
        const btnResetScores = document.getElementById('btn-reset-scores');
        
        const winOverlay = document.getElementById('win-overlay');
        const winText = document.getElementById('win-text');
        const btnNextRound = document.getElementById('btn-next-round');

        // Inicialización
        window.addEventListener('DOMContentLoaded', () => {
            initGame();
        });

        function initGame() {
            // Eventos de los clics en las celdas
            cells.forEach(cell => {
                cell.addEventListener('click', handleCellClick);
            });

            // Cambiar Modos de Juego
            btnPvp.addEventListener('click', () => setGameMode('pvp'));
            btnPve.addEventListener('click', () => setGameMode('pve'));

            // Cambiar Dificultad
            btnEasy.addEventListener('click', () => setDifficulty('easy'));
            btnHard.addEventListener('click', () => setDifficulty('hard'));

            // Botones de Reset
            btnResetBoard.addEventListener('click', () => resetBoard());
            btnResetScores.addEventListener('click', () => resetScores());
            btnNextRound.addEventListener('click', () => resetBoard());
        }

        // Cambiar entre 2 Jugadores o Contra la PC
        function setGameMode(mode) {
            gameMode = mode;
            if (mode === 'pvp') {
                btnPvp.className = "flex-1 py-2 px-3 rounded-xl text-sm font-semibold transition-all duration-300 bg-indigo-600 text-white shadow-lg shadow-indigo-600/30";
                btnPve.className = "flex-1 py-2 px-3 rounded-xl text-sm font-semibold transition-all duration-300 bg-slate-700 text-slate-300 hover:bg-slate-600";
                difficultyContainer.classList.add('hidden');
                labelO.textContent = "Jugador O";
            } else {
                btnPve.className = "flex-1 py-2 px-3 rounded-xl text-sm font-semibold transition-all duration-300 bg-indigo-600 text-white shadow-lg shadow-indigo-600/30";
                btnPvp.className = "flex-1 py-2 px-3 rounded-xl text-sm font-semibold transition-all duration-300 bg-slate-700 text-slate-300 hover:bg-slate-600";
                difficultyContainer.classList.remove('hidden');
                labelO.textContent = "Computadora";
            }
            resetScores();
        }

        // Cambiar dificultad de la IA
        function setDifficulty(diff) {
            aiDifficulty = diff;
            if (diff === 'easy') {
                btnEasy.className = "py-1 px-3 rounded-lg text-xs font-bold bg-green-500/20 text-green-400 border border-green-500/30";
                btnHard.className = "py-1 px-3 rounded-lg text-xs font-bold bg-slate-700 text-slate-400 hover:bg-slate-600";
            } else {
                btnHard.className = "py-1 px-3 rounded-lg text-xs font-bold bg-red-500/20 text-red-400 border border-red-500/30";
                btnEasy.className = "py-1 px-3 rounded-lg text-xs font-bold bg-slate-700 text-slate-400 hover:bg-slate-600";
            }
            resetBoard();
        }

        // Manejar el clic del usuario
        function handleCellClick(e) {
            const index = parseInt(e.target.dataset.index);

            // Cancelar si la celda está ocupada, el juego terminó, o la IA está calculando su turno
            if (board[index] !== null || isGameOver || isAiThinking) return;

            makeMove(index, turn);

            // Si es contra la IA y el juego no ha terminado, juega la máquina
            if (gameMode === 'pve' && !isGameOver) {
                isAiThinking = true;
                updateStatusText();
                setTimeout(() => {
                    playAiMove();
                    isAiThinking = false;
                }, 400); // Pequeño delay artificial para mayor realismo
            }
        }

        // Realizar movimiento en el tablero de un jugador
        function makeMove(index, player) {
            board[index] = player;
            
            // Renderizar la celda con estilo
            const cell = cells[index];
            cell.innerHTML = getSymbolSVG(player);
            
            // Validar resultado
            const winCombo = checkWin(board, player);
            if (winCombo) {
                endGame(player, winCombo);
            } else if (board.every(cell => cell !== null)) {
                endGame('tie');
            } else {
                // Siguiente turno
                turn = turn === 'X' ? 'O' : 'X';
                updateStatusText();
            }
        }

        // Actualizar el texto del estado del turno
        function updateStatusText() {
            if (isAiThinking) {
                gameStatus.innerHTML = `<span class="text-rose-400 animate-pulse font-semibold">Computadora pensando...</span>`;
            } else {
                const colorClass = turn === 'X' ? 'text-cyan-400' : 'text-rose-400';
                const label = (gameMode === 'pve' && turn === 'O') ? 'Computadora' : `Jugador ${turn}`;
                gameStatus.innerHTML = `Turno de <span class="${colorClass} font-bold">${label}</span>`;
            }
        }

        // Comprobar si hay ganador
        function checkWin(currentBoard, player) {
            for (const combo of WINNING_COMBOS) {
                if (combo.every(index => currentBoard[index] === player)) {
                    return combo;
                }
            }
            return null;
        }

        // Finalizar el juego
        function endGame(result, winCombo = null) {
            isGameOver = true;

            if (result === 'tie') {
                scores.ties++;
                scoreTies.textContent = scores.ties;
                winText.innerHTML = "¡Empate! 🤝";
                winText.className = "text-3xl font-black text-slate-300";
            } else {
                scores[result]++;
                if (result === 'X') {
                    scoreX.textContent = scores.X;
                    winText.innerHTML = "¡Ganó X! 🎉";
                    winText.className = "text-3xl font-black text-cyan-400";
                } else {
                    scoreO.textContent = scores.O;
                    const winnerName = gameMode === 'pve' ? 'Computadora' : 'O';
                    winText.innerHTML = `¡Ganó ${winnerName}! 🏆`;
                    winText.className = "text-3xl font-black text-rose-400";
                }

                // Destacar las celdas ganadoras
                if (winCombo) {
                    winCombo.forEach(index => {
                        cells[index].classList.add('winning-cell', 'bg-indigo-900/40', 'border-indigo-500');
                    });
                }
            }

            // Mostrar el overlay de fin de juego con transición de entrada
            setTimeout(() => {
                winOverlay.classList.remove('pointer-events-none', 'opacity-0');
                winOverlay.classList.add('opacity-100');
            }, 600);
        }

        // Reiniciar el tablero para una nueva ronda
        function resetBoard() {
            board = Array(9).fill(null);
            isGameOver = false;
            isAiThinking = false;
            turn = 'X'; // X siempre vuelve a empezar

            // Esconder overlay
            winOverlay.classList.remove('opacity-100');
            winOverlay.classList.add('pointer-events-none', 'opacity-0');

            // Limpiar celdas
            cells.forEach(cell => {
                cell.innerHTML = '';
                cell.className = "gato-cell flex items-center justify-center bg-slate-800 rounded-2xl border border-slate-700/50 hover:bg-slate-700/40 text-5xl font-extrabold focus:outline-none";
            });

            updateStatusText();
        }

        // Reiniciar puntuaciones a cero
        function resetScores() {
            scores.X = 0;
            scores.O = 0;
            scores.ties = 0;
            scoreX.textContent = 0;
            scoreO.textContent = 0;
            scoreTies.textContent = 0;
            resetBoard();
        }

        // Generar SVGs personalizados para X y O
        function getSymbolSVG(symbol) {
            if (symbol === 'X') {
                return `
                    <svg class="w-14 h-14 text-cyan-400 animate-scale-up" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                `;
            } else {
                return `
                    <svg class="w-14 h-14 text-rose-400 animate-scale-up" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                    </svg>
                `;
            }
        }

        // --- INTELIGENCIA ARTIFICIAL (IA) ---

        function playAiMove() {
            let targetIndex;

            if (aiDifficulty === 'easy') {
                targetIndex = getRandomMove();
            } else {
                targetIndex = getBestMove();
            }

            if (targetIndex !== undefined && targetIndex !== null) {
                makeMove(targetIndex, 'O');
            }
        }

        // IA Fácil: Movimiento aleatorio
        function getRandomMove() {
            const available = board.map((val, idx) => val === null ? idx : null).filter(val => val !== null);
            if (available.length === 0) return null;
            return available[Math.floor(Math.random() * available.length)];
        }

        // IA Imposible: Algoritmo Minimax para un juego perfecto
        function getBestMove() {
            let bestScore = -Infinity;
            let move;

            for (let i = 0; i < 9; i++) {
                if (board[i] === null) {
                    board[i] = 'O'; // Probar movimiento de IA
                    let score = minimax(board, 0, false);
                    board[i] = null; // Deshacer

                    if (score > bestScore) {
                        bestScore = score;
                        move = i;
                    }
                }
            }
            return move;
        }

        // Puntuación heurística para Minimax
        const scoresMinimax = {
            O: 10,  // IA gana
            X: -10, // Humano gana
            tie: 0  // Empate
        };

        function minimax(tempBoard, depth, isMaximizing) {
            // Verificar si hay ganador en este estado hipotético
            if (checkWin(tempBoard, 'O')) return scoresMinimax.O - depth;
            if (checkWin(tempBoard, 'X')) return scoresMinimax.X + depth;
            if (tempBoard.every(cell => cell !== null)) return scoresMinimax.tie;

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (tempBoard[i] === null) {
                        tempBoard[i] = 'O';
                        let score = minimax(tempBoard, depth + 1, false);
                        tempBoard[i] = null;
                        bestScore = Math.max(score, bestScore);
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (tempBoard[i] === null) {
                        tempBoard[i] = 'X';
                        let score = minimax(tempBoard, depth + 1, true);
                        tempBoard[i] = null;
                        bestScore = Math.min(score, bestScore);
                    }
                }
                return bestScore;
            }
        }
    </script>
</body>
</html>
